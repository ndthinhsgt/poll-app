<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll App | Thông tin Vote</title>
    <link rel="stylesheet" href="./assets/css/common.css">
    <link rel="stylesheet" href="./assets/css/detail.css">
</head>

<body>
    <div class="body-top">
        <h1>Thông tin Vote</h1>
        <div>
            <button id="back">Trở lại</button>
            <button id="logout">Đăng xuất</button>
        </div>
    </div>

    <div class="vote-content">
        <fieldset disabled>
            <label for="title">Tiêu đề</label>
            <input type="text" name="title">
            <label for="option">Option</label>

            <div id="more-option"></div>
        </fieldset>
    </div>

    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/detail.js"></script>
    <script>
        const votes = getVotes();
        const voteResult = getVotingResult();
        const query = new URLSearchParams(window.location.search);
        const id = query.get("id")
        if (!id) {
            alert("Not found");
            window.location.href = "/list"
        }

        const find = votes.find((v, index) => index === parseInt(id))
        
        if (!find) {
            alert("Poll not found");
            window.location.href = "/list";
        }

        function $(id) {
            return document.querySelector(id);
        }

        $("input[name='title']").value = find.question

        const moreOptionDiv = $("#more-option");
        moreOptionDiv.innerHTML = "";
        
        find.options?.forEach((option, index) => {
            const container = document.createElement("div");
            container.style.display = "flex";
            
            const input = document.createElement("input");
            input.value = option.text;
            container.appendChild(input);
            
            const voteCount = voteResult?.[parseInt(id)]?.[index]?.length ?? 0;
            const voteText = document.createTextNode(` ${voteCount} votes`);
            container.appendChild(voteText);
            
            moreOptionDiv.appendChild(container);
        });
    </script>
</body>

</html>
