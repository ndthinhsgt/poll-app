<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll App | Votes</title>
    <link rel="stylesheet" href="./assets/css/common.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>    
    <div class="header">
        <h1>Votes</h1>
        <div class="button-top">
            <button id="createvote">Tạo vote</button>
            <button id="logout">Đăng xuất</button>
        </div>
    </div>
    <form action="" method="get" class="form-control">
        <fieldset>
            <div class="form-top">
                <b>Hôm nay ăn gì</b>
                <div class="user" id="user">Huy</div>
            </div>
                
            <div class="form-content">
                <input type="radio" id="rice" name="food" value="rice">
                <label for="rice">Ăn cơm</label>
                <br>
                <input type="radio" id="noodle" name="food" value="noodle">
                <label for="noodle">Ăn mì</label>
            </div>
            
            <div class="form-footer">
                <button id="vote">Tạo vote</button>
                <button id="detail">Detail</button>
            </div>
        </fieldset>   
    </form>    

    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/script.js"></script>     
    
</body>
</html>
